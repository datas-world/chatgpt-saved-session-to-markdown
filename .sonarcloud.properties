# SonarCloud configuration for Python repositories.
# The project key and organization are auto-detected by the SonarCloud GitHub App.
# No sonar.projectKey is needed here — the app binds via the GitHub repository.

sonar.python.version=3.12

sonar.exclusions=\
  **/.venv/**,\
  **/venv/**,\
  **/.tox/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.egg-info/**

sonar.test.inclusions=\
  **/tests/**,\
  **/*_test.py,\
  **/test_*.py

sonar.python.coverage.reportPaths=coverage.xml
